# AI Agent Harness 最小配置文件
#
# 此文件定义了 Tackle Harness 框架的核心配置
#
# 配置优先级（从高到低）：
#   1. 环境变量 (HARNESS_<KEY>)
#   2. 本配置文件 (harness-config.yaml)
#   3. 插件默认值

# ---------------------------------------------------------------------------
# 上下文窗口配置
# 控制任务创建技能在分析大文件时的分块读取行为
# ---------------------------------------------------------------------------
context_window:
  max_tokens: 200000
  safety_margin: 40000
  chunk_lines: 500
  strategy: "auto"

  thresholds:
    small: 200
    medium: 800
    large: 2000

# ---------------------------------------------------------------------------
# 工作流配置
# 定义 AI Agent 的执行流程和阶段
# ---------------------------------------------------------------------------
workflow:
  default:
    name: "标准开发工作流"
    description: "从需求到实现的完整开发流程"

    stages:
      - id: "planning"
        name: "需求分析与规划"
        description: "理解需求，制定实现计划"
        skills: ["task-creator", "split-work-package"]
        auto_advance: false
        checkpoint: true

      - id: "review"
        name: "计划审核"
        description: "人工审核计划，确认实现方案"
        skills: ["human-checkpoint"]
        auto_advance: false
        checkpoint: true

      - id: "implementation"
        name: "任务执行"
        description: "按照计划实现功能"
        skills: ["agent-dispatcher"]
        auto_advance: false
        checkpoint: false

      - id: "verification"
        name: "质量检查"
        description: "验证实现结果，检查验收标准"
        skills: ["checklist", "experience-logger"]
        auto_advance: false
        checkpoint: true

      - id: "report"
        name: "完成汇报"
        description: "生成完成报告，总结工作成果"
        skills: ["completion-report"]
        auto_advance: false
        checkpoint: false

# ---------------------------------------------------------------------------
# Agent Dispatcher 配置
# 控制子代理批量任务调度的并发数量
# ---------------------------------------------------------------------------
agent_dispatcher:
  concurrency:
    default_max: 6

    schedules:
      - name: "peak"
        time_range:
          start: "14:00"
          end: "18:00"
        max_concurrent: 3
